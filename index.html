<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grace &amp; Co. Home Services</title>
    <meta name="description" content="Professional cleaning and home organization serving the Greater Toronto Area. More than cleaning — we transform spaces." />
  </head>
  <body>
    <div id="root"></div>

    <!-- Hidden static form so Netlify detects it at build time. Do not remove. -->
    <form name="booking-request" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" style="display:none" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="address" />
      <input type="text" name="service" />
      <input type="text" name="date" />
      <input type="text" name="time" />
      <input type="text" name="price" />
      <input type="text" name="deposit" />
      <textarea name="notes"></textarea>
    </form>

    <script type="module" src="/main.jsx"></script>
  </body>
</html>
